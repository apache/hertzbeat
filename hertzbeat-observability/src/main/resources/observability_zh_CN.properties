observability.otlp.guide.metrics.http.description=把指标数据发送到这个 OTLP HTTP 地址。收到数据后，可直接在监控和实体详情中继续查看。
observability.otlp.guide.metrics.http.note=如果已经配置了监控任务，数据会继续显示在对应的监控项中。
observability.otlp.guide.logs.http.description=把日志数据发送到这个 OTLP HTTP 地址。收到数据后，可直接前往日志管理查看。
observability.otlp.guide.logs.http.note=使用接入令牌即可完成认证。
observability.otlp.guide.traces.http.description=把链路数据发送到这个 OTLP HTTP 地址。收到数据后，可直接前往链路管理查看。
observability.otlp.guide.traces.http.note=系统会根据服务信息自动尝试关联到实体。
observability.otlp.guide.metrics.grpc.description=把指标数据发送到这个 OTLP gRPC 地址，适合已经使用 OpenTelemetry Collector 或语言 SDK 的服务。
observability.otlp.guide.metrics.grpc.note=收到数据后，可直接在监控和实体详情中继续查看。
observability.otlp.guide.logs.grpc.description=把日志数据发送到这个 OTLP gRPC 地址。收到数据后，可直接前往日志管理查看。
observability.otlp.guide.logs.grpc.note=使用 Authorization Bearer 接入令牌即可完成认证。
observability.otlp.guide.traces.grpc.description=把链路数据发送到这个 OTLP gRPC 地址。收到数据后，可直接前往链路管理查看。
observability.otlp.guide.traces.grpc.note=系统会根据服务信息自动尝试关联到实体。
