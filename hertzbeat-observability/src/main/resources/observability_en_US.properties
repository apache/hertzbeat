observability.otlp.guide.metrics.http.description=Send metrics data to this OTLP HTTP endpoint. After data arrives, continue from monitors and entity details.
observability.otlp.guide.metrics.http.note=If monitor tasks are already configured, the data continues to appear in the corresponding monitors.
observability.otlp.guide.logs.http.description=Send logs data to this OTLP HTTP endpoint. After data arrives, review it from log management.
observability.otlp.guide.logs.http.note=Use an intake token for authentication.
observability.otlp.guide.traces.http.description=Send trace data to this OTLP HTTP endpoint. After data arrives, review it from trace management.
observability.otlp.guide.traces.http.note=The system tries to associate data with entities from service information automatically.
observability.otlp.guide.metrics.grpc.description=Send metrics data to this OTLP gRPC endpoint. This fits services already using an OpenTelemetry Collector or language SDK.
observability.otlp.guide.metrics.grpc.note=After data arrives, continue from monitors and entity details.
observability.otlp.guide.logs.grpc.description=Send logs data to this OTLP gRPC endpoint. After data arrives, review it from log management.
observability.otlp.guide.logs.grpc.note=Use the Authorization Bearer intake token for authentication.
observability.otlp.guide.traces.grpc.description=Send trace data to this OTLP gRPC endpoint. After data arrives, review it from trace management.
observability.otlp.guide.traces.grpc.note=The system tries to associate data with entities from service information automatically.
