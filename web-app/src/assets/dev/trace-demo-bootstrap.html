<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HertzBeat Trace Demo Bootstrap</title>
    <style>
      body {
        margin: 0;
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: #0d0f13;
        color: #e7ecf5;
        font:
          14px/1.5 -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .bootstrap-card {
        width: min(420px, calc(100vw - 48px));
        padding: 24px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 12px;
        background: #15181e;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }

      .bootstrap-title {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 700;
      }

      .bootstrap-copy {
        margin: 0;
        color: #aab4c5;
      }
    </style>
  </head>
  <body>
    <section class="bootstrap-card">
      <h1 class="bootstrap-title">正在准备 Trace 演示页面</h1>
      <p class="bootstrap-copy">即将写入本地授权信息并跳转到目标路由。</p>
    </section>
    <script>
      (function bootstrap() {
        const search = new URLSearchParams(window.location.search);
        const token = search.get('token');
        const refresh = search.get('refresh');
        const target =
          search.get('target') ||
          '/trace/manage?traceId=trace-ui-rich-demo-20260401&start=1775032200000&end=1775032800000';

        if (token) {
          localStorage.setItem('Authorization', token);
        }
        if (refresh) {
          localStorage.setItem('refresh-token', refresh);
        }

        window.setTimeout(() => {
          window.location.replace(target);
        }, 120);
      })();
    </script>
  </body>
</html>
