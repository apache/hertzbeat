<section class="ops-timeline-card">
  <header class="ops-timeline-header">{{ title }}</header>

  <div class="ops-timeline-empty" *ngIf="items.length === 0">{{ emptyText }}</div>

  <ol class="ops-timeline-list" *ngIf="items.length > 0">
    <li class="ops-timeline-item" *ngFor="let item of items" [class]="'tone-' + (item.tone || 'info')">
      <div class="ops-timeline-marker"></div>
      <div class="ops-timeline-main">
        <div class="ops-timeline-topline">
          <div class="ops-timeline-title">{{ item.title }}</div>
          <nz-tag *ngIf="item.tag">{{ item.tag }}</nz-tag>
        </div>
        <div class="ops-timeline-detail" *ngIf="item.detail">{{ item.detail }}</div>
        <div class="ops-timeline-time" *ngIf="item.timestamp">{{ item.timestamp }}</div>
      </div>
    </li>
  </ol>
</section>
