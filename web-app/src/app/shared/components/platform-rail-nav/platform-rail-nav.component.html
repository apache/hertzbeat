<nav class="platform-rail-nav" aria-label="platform-rail-nav">
  <section class="catalog-rail-group" *ngFor="let group of groups; trackBy: trackByGroup">
    <div class="catalog-rail-title">{{ group.title }}</div>
    <div class="catalog-rail-entity-hint" *ngIf="group.hintTitle || group.hintMeta">
      <span class="catalog-rail-entity-name" *ngIf="group.hintTitle">{{ group.hintTitle }}</span>
      <span class="catalog-rail-entity-meta" *ngIf="group.hintMeta">{{ group.hintMeta }}</span>
    </div>

    <ng-container *ngFor="let item of group.items; trackBy: trackByItem">
      <button
        *ngIf="!item.static; else staticRailItem"
        type="button"
        class="catalog-rail-item"
        [class.active]="item.active"
        [attr.title]="item.tooltip || item.label"
        (click)="handleItemClick(item)"
      >
        <span class="catalog-rail-item-main">
          <i nz-icon [nzType]="item.icon"></i>
          <span>{{ item.label }}</span>
        </span>
        <span class="catalog-rail-item-count" *ngIf="item.count != null">{{ item.count }}</span>
      </button>

      <ng-template #staticRailItem>
        <div class="catalog-rail-item static" [attr.title]="item.tooltip || item.label">
          <span class="catalog-rail-item-main">
            <i nz-icon [nzType]="item.icon"></i>
            <span>{{ item.label }}</span>
          </span>
          <span class="catalog-rail-item-count" *ngIf="item.count != null">{{ item.count }}</span>
        </div>
      </ng-template>
    </ng-container>
  </section>
</nav>
