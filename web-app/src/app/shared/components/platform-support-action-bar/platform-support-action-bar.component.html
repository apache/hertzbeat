<div class="platform-support-action-bar" *ngIf="items.length > 0">
  <button
    *ngFor="let item of items"
    nz-button
    nzType="link"
    nzSize="small"
    type="button"
    class="platform-support-action-bar-button"
    [class.platform-support-action-bar-button--primary]="item.tone === 'primary'"
    [disabled]="item.disabled"
    (click)="onItemClick(item)"
  >
    {{ item.label }}
  </button>
</div>
