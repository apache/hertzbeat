<section
  class="platform-stage-section"
  [class.platform-stage-section--compact]="compact"
  [class.platform-stage-section--subtle]="tone === 'subtle'"
>
  <header class="platform-stage-section-header" *ngIf="hasHeader">
    <div class="platform-stage-section-copy">
      <div class="platform-stage-section-kicker" *ngIf="kicker">{{ kicker }}</div>
      <div class="platform-stage-section-title" *ngIf="title">{{ title }}</div>
      <div class="platform-stage-section-description" *ngIf="description">{{ description }}</div>
    </div>

    <div class="platform-stage-section-actions">
      <ng-content select="[stageHeaderActions]"></ng-content>
    </div>
  </header>

  <div class="platform-stage-section-body">
    <ng-content></ng-content>
  </div>
</section>
