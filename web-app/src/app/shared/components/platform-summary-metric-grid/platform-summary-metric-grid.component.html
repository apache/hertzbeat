<div class="platform-summary-metric-grid">
  <article
    class="platform-summary-metric-grid-item"
    *ngFor="let item of items"
    [class.platform-summary-metric-grid-item--accent]="item.tone === 'accent'"
    [class.platform-summary-metric-grid-item--critical]="item.tone === 'critical'"
    [class.platform-summary-metric-grid-item--warning]="item.tone === 'warning'"
    [class.platform-summary-metric-grid-item--success]="item.tone === 'success'"
  >
    <div class="platform-summary-metric-grid-head">
      <i *ngIf="item.icon" nz-icon [nzType]="item.icon" class="platform-summary-metric-grid-icon"></i>
      <span>{{ item.label }}</span>
    </div>
    <div class="platform-summary-metric-grid-main">
      <strong class="platform-summary-metric-grid-value">{{ item.value }}</strong>
      <button
        *ngIf="item.actionLabel && item.actionKey"
        class="platform-summary-metric-grid-action"
        nz-button
        nzType="link"
        nzSize="small"
        type="button"
        (click)="onActionSelected(item)"
      >
        {{ item.actionLabel }}
      </button>
    </div>
  </article>
</div>
