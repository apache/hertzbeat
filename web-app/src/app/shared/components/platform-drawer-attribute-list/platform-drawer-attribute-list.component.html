<div class="platform-drawer-attribute-list" [class.platform-drawer-attribute-list--detail]="variant === 'detail'">
  <div class="platform-drawer-attribute-item" *ngFor="let item of items">
    <span class="platform-drawer-attribute-key">{{ item.key }}</span>
    <span class="platform-drawer-attribute-value">{{ item.value }}</span>
  </div>
</div>
