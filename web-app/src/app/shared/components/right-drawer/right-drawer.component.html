<aside class="ops-right-drawer" *ngIf="visible && payload">
  <header class="ops-right-drawer-header">
    <div class="ops-right-drawer-heading">
      <div class="ops-right-drawer-title">{{ payload.title }}</div>
      <div class="ops-right-drawer-subtitle" *ngIf="payload.subtitle">{{ payload.subtitle }}</div>
    </div>

    <button nz-button nzType="text" type="button" class="ops-right-drawer-close" (click)="close()">
      ×
    </button>
  </header>

  <div class="ops-right-drawer-status" *ngIf="payload.status">
    <nz-tag [nzColor]="payload.status === 'critical' ? 'error' : payload.status === 'warning' ? 'warning' : 'processing'">
      {{ getStatusLabel(payload.status) }}
    </nz-tag>
  </div>

  <p class="ops-right-drawer-description" *ngIf="payload.description">
    {{ payload.description }}
  </p>

  <div class="ops-right-drawer-tags" *ngIf="payload.tags?.length">
    <nz-tag *ngFor="let tag of payload.tags">{{ tag }}</nz-tag>
  </div>

  <div class="ops-right-drawer-sections" *ngIf="payload.sections?.length">
    <section class="ops-right-drawer-section" *ngFor="let section of payload.sections">
      <div class="ops-right-drawer-section-label">{{ section.label }}</div>
      <div class="ops-right-drawer-section-value">{{ section.value }}</div>
    </section>
  </div>

  <nz-divider *ngIf="payload.actions?.length"></nz-divider>

  <div class="ops-right-drawer-actions" *ngIf="payload.actions?.length">
    <button
      *ngFor="let action of payload.actions"
      nz-button
      [nzType]="action.tone === 'primary' ? 'primary' : 'default'"
      [nzDanger]="action.tone === 'danger'"
      type="button"
      (click)="triggerAction(action.key)"
    >
      {{ action.label }}
    </button>
  </div>
</aside>
