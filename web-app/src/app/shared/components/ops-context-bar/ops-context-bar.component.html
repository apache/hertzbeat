<section class="ops-context-bar ops-context-bar--console is-toolbar is-console-toolbar">
  <div class="ops-context-toolbar-strip ops-context-toolbar-strip--compact">
    <div class="ops-context-toolbar-main">
      <div class="ops-context-title-block">
        <div class="ops-context-kicker">{{ translate('ops.context.kicker') }}</div>
        <div class="ops-context-title">{{ translate('ops.context.title') }}</div>
        <div class="ops-context-subtitle">
          {{ activeRangeLabel() }}
          <span class="ops-context-dot">·</span>
          {{ activeFiltersLabel() }}
        </div>
      </div>

      <div class="ops-context-toolbar-tools">
        <div class="ops-context-range-group">
          <button
            *ngFor="let preset of presetOptions"
            nz-button
            nzType="default"
            type="button"
            class="ops-context-range-option"
            [class.is-active]="facade.timeRange().presetKey === preset.key"
            (click)="setPreset(preset.key)"
          >
            {{ getTimePresetLabel(preset) }}
          </button>
        </div>

        <button nz-button nzType="default" type="button" class="ops-context-refresh-toggle" (click)="toggleAutoRefresh()">
          <span aria-hidden="true">↻</span>
          {{ getAutoRefreshLabel() }}
        </button>
      </div>
    </div>
  </div>

  <div class="ops-context-toolbar-strip ops-context-toolbar-strip--secondary">
    <div class="ops-context-bar-secondary">
      <label class="ops-context-search">
        <span aria-hidden="true">/</span>
        <input nz-input [(ngModel)]="searchInput" [placeholder]="translate('ops.context.search.placeholder')" (keydown.enter)="applySearch()" />
      </label>

      <div class="ops-context-toolbar-tools">
        <div class="ops-context-quick-filters">
          <div class="ops-context-quick-group" *ngFor="let quickFilter of quickFilters">
            <span class="ops-context-quick-label">{{ getQuickFilterLabel(quickFilter.label) }}</span>
            <button
              *ngFor="let value of quickFilter.values"
              nz-button
              nzType="default"
              type="button"
              class="ops-context-quick-option"
              (click)="addQuickFilter(quickFilter.key, value)"
            >
              {{ getQuickFilterValueLabel(quickFilter.key, value) }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="ops-context-chip-row" *ngIf="facade.filterChips().length > 0">
    <button
      type="button"
      class="ops-context-chip"
      *ngFor="let chip of facade.filterChips()"
      (click)="removeChip(chip.key, chip.value)"
      [attr.aria-label]="getChipAriaLabel(getFilterChipValueLabel(chip.key, chip.value))"
    >
      <span class="ops-context-chip-label">{{ getFilterChipLabel(chip.key) }}</span>
      <span class="ops-context-chip-value">{{ getFilterChipValueLabel(chip.key, chip.value) }}</span>
      <span class="ops-context-chip-remove"> × </span>
    </button>

    <button nz-button nzType="link" type="button" class="ops-context-chip-clear" (click)="clearAllFilters()">
      {{ translate('ops.context.clear-all') }}
    </button>
  </div>
</section>
