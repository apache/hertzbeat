<div class="platform-panel-header" [class.platform-panel-header--compact]="compact">
  <div class="platform-panel-header-copy">
    <div class="platform-panel-header-title">{{ title }}</div>
    <div class="platform-panel-header-description" *ngIf="description">{{ description }}</div>
    <ng-content select="[panelHeaderMeta]"></ng-content>
  </div>

  <div class="platform-panel-header-actions">
    <ng-content select="[panelHeaderActions]"></ng-content>
  </div>
</div>
