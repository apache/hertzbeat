<details class="platform-support-panel" [attr.open]="expanded ? '' : null">
  <summary class="platform-support-panel-summary">
    <div class="platform-support-panel-copy">
      <div class="platform-support-panel-title">{{ title }}</div>
      <div class="platform-support-panel-subtitle" *ngIf="subtitle">{{ subtitle }}</div>
    </div>
    <span class="platform-support-panel-action">{{ actionLabel }}</span>
  </summary>

  <div class="platform-support-panel-body">
    <ng-content></ng-content>
  </div>
</details>
