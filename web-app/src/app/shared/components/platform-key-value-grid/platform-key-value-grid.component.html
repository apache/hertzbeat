<div class="platform-key-value-grid" [class.platform-key-value-grid--compact]="compact">
  <article class="platform-key-value-grid-item" *ngFor="let item of items">
    <span class="platform-key-value-grid-label">{{ item.label }}</span>
    <strong class="platform-key-value-grid-value">{{ item.value }}</strong>
  </article>
</div>
