<div class="platform-support-link-list" *ngIf="items.length > 0">
  <button
    *ngFor="let item of items"
    nz-button
    nzType="link"
    nzSize="small"
    type="button"
    class="platform-support-link-list-item"
    [disabled]="item.disabled"
    (click)="selectItem(item)"
  >
    <span class="platform-support-link-list-title">{{ item.label }}</span>
    <span class="platform-support-link-list-description" *ngIf="item.description">{{ item.description }}</span>
  </button>
</div>
