<app-page-shell [kicker]="'menu.alert.integration' | i18n" [title]="selectedSource?.name || ('menu.alert.integration' | i18n)">
  <div pageHeaderMeta class="alert-integration-header-meta">
    {{ 'alert.integration.source' | i18n }}
  </div>

  <div pageHeaderActions class="alert-integration-header-actions">
    <button nz-button nzType="default" (click)="goToTokenManagement()">
      <span nz-icon nzType="setting" nzTheme="outline"></span>
      {{ 'alert.integration.token.manage' | i18n }}
    </button>
  </div>

  <div pageContent class="alert-integration-container">
    <aside class="data-sources">
      <h2>{{ 'alert.integration.source' | i18n }}</h2>
      <div class="source-list">
        <div
          class="source-item"
          *ngFor="let source of dataSources"
          (click)="selectSource(source)"
          [class.active]="selectedSource?.id === source.id"
        >
          <img [src]="source.icon" [alt]="source.name" />
          <span>{{ source.name }}</span>
        </div>
      </div>
    </aside>

    <section class="doc-content">
      <ng-container *ngIf="selectedSource">
        <app-platform-section-header class="doc-content-header" [title]="selectedSource.name"></app-platform-section-header>
        <markdown appMarkdownMermaid [data]="markdownContent"></markdown>
      </ng-container>
    </section>
  </div>
</app-page-shell>
