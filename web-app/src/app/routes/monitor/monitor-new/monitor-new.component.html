<app-page-shell [kicker]="pageShellKicker" [title]="pageShellTitle" [subtitle]="pageShellCopy">
  <div pageContent class="monitor-page-shell__content monitor-page-shell__content--form-stage">
    <div class="monitor-page-shell__content-inner">
      <app-monitor-route-state-panel
        *ngIf="routeState !== 'ready'"
        [state]="routeState"
        [title]="routeStateTitle"
        [description]="routeStateDescription"
        [showRetry]="routeState === 'error'"
        [retryLabel]="'monitor.route-state.action.retry' | i18n"
        (retryRequested)="retryInit()"
      />

      <app-monitor-form
        *ngIf="routeState === 'ready'"
        [embedded]="true"
        [loading]="isSpinning"
        [loadingTip]="spinningTip"
        [monitor]="monitor"
        [grafanaDashboard]="grafanaDashboard"
        [hostName]="hostName"
        [params]="params"
        [paramDefines]="paramDefines"
        [advancedParams]="advancedParams"
        [advancedParamDefines]="advancedParamDefines"
        [collector]="collector"
        [collectors]="collectors"
        [labelKeys]="labelKeys"
        [labelMap]="labelMap"
        [labelIsCustom]="labelIsCustom"
        [sdParams]="sdParams"
        [sdDefines]="sdDefines"
        (scrapeChange)="onScrapeChange($event)"
        (hostChange)="onHostChange($event)"
        (formCancel)="onCancel()"
        (formSubmit)="onSubmit($event)"
        (formDetect)="onDetect($event)"
      />
    </div>
  </div>
</app-page-shell>
